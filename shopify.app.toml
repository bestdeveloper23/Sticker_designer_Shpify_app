# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "de5a97afdffc7c57399e106356013013"
name = "Custom Sticker Designer"
# REQUIRED for production and App Store: Your live app URL (HTTPS). Webhooks and billing redirects use this.
# Set to your real host before publishing (e.g. https://your-app.example.com). example.com will cause webhook/billing failures.
application_url = "https://sticker-designer-shpify-app.vercel.app/"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "orders/paid" ]
  uri = "/webhooks/orders/paid"

[access_scopes]
# read_orders required for orders/paid webhook. Billing API works without a separate scope when using GraphQL billing mutations.
# See https://shopify.dev/docs/apps/build/authentication-authorization/app-installation/manage-access-scopes
scopes = "write_products,write_app_proxy,read_orders,write_draft_orders"

[app_proxy]
url = "/apps/proxy"
prefix = "apps"
subpath = "custom-stickers"

[auth]
# Must match application_url domain exactly (same as application_url above).
redirect_urls = [ "https://sticker-designer-shpify-app.vercel.app/api/auth" ]
